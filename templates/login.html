{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-lg shadow-md border border-gray-200 p-8">
            <h2 class="text-2xl font-bold text-center text-cyan-800 mb-8">TBROS Login</h2>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded mb-4 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="username">
                        Username
                    </label>
                    <input type="text" name="username" id="username" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-shadow"
                        placeholder="Enter username">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium text-gray-700 mb-2" for="password">
                        Password
                    </label>
                    <input type="password" name="password" id="password" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-shadow"
                        placeholder="Enter password">
                </div>

                <button type="submit" 
                    class="w-full bg-cyan-800 hover:bg-cyan-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
