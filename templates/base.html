<!DOCTYPE html>
<html lang="en" class="text-gray-900 font-sans">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBROS - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='images/tb.ico') }}" rel="shortcut icon">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col" style="background-color: #f9fafb;">

    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                <a href="{{ url_for('salary.index') }}" class="text-xl font-bold text-cyan-800 hover:text-cyan-600 transition-colors">
                    <span class="sm:inline">TBROS Ventures</span>
                    <span class="block sm:inline sm:ml-1">Sdn. Bhd.</span>
                </a>
            {% if current_user.is_authenticated %}
            <div class="flex items-center gap-6">
                <div class="relative">
                    <button onclick="toggleMenu()" class="flex items-center gap-1 text-gray-600 hover:text-cyan-700 transition-colors cursor-pointer">
                        Menu
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div id="dropdownMenu" class="hidden absolute top-full right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-50">
                        <a href="{{ url_for('employees.add') }}" class="block px-4 py-2 text-gray-700 hover:bg-cyan-50 hover:text-cyan-700">Add Employee</a>
                        <a href="{{ url_for('employees.list_employees') }}" class="block px-4 py-2 text-gray-700 hover:bg-cyan-50 hover:text-cyan-700">All Employees</a>
                        <a href="{{ url_for('salary.all_work_lists') }}" class="block px-4 py-2 text-gray-700 hover:bg-cyan-50 hover:text-cyan-700">Work Lists</a>
                    </div>
                </div>
                <a href="{{ url_for('auth.logout') }}" class="px-3 py-1.5 text-sm font-medium text-gray-600 border border-gray-400 hover:text-white hover:bg-red-500 hover:border-red-500 rounded-lg transition-colors">Logout</a>
            </div>
            {% endif %}
        </div>
    </header>

    <script>
    function toggleMenu() {
        const menu = document.getElementById('dropdownMenu');
        menu.classList.toggle('hidden');
    }
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('dropdownMenu');
        if (!e.target.closest('[onclick="toggleMenu()"]') && !e.target.closest('#dropdownMenu')) {
            menu.classList.add('hidden');
        }
    });
    </script>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 py-4 mt-auto">
        <div class="text-center text-sm text-gray-500">
            © 2022 TBROS Ventures Sdn. Bhd.
        </div>
    </footer>

</body>

</html>
